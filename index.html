<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Football Referee Pro v2</title>
  <link rel="stylesheet" href="./src/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- UI Overlay Section -->
    <div id="ui-container">
      <!-- Loading Screen -->
      <div id="loading-screen" class="glass-overlay">
        <div class="loader-content">
          <div class="soccer-ball-spinner">⚽</div>
          <h2>INICIALIZANDO MOTOR PRO</h2>
          <p>Cargando físicas de Rapier y Renderizado Volumétrico...</p>
          <div class="progress-bar-container">
            <div id="load-progress" class="progress-bar"></div>
          </div>
        </div>
      </div>

      <!-- Main Menu -->
      <div id="main-menu" class="glass-module hidden">
        <div class="menu-header">
            <span class="logo">🏆</span>
            <h1>Football Referee <span class="accent">PRO</span></h1>
            <p class="tagline">v2.0 Next-Gen Simulation</p>
        </div>
        
        <div class="menu-body">
          <div class="setup-group">
            <label>⏱️ DURACIÓN</label>
            <select id="match-duration">
              <option value="1">1 Minuto</option>
              <option value="2" selected>2 Minutos</option>
              <option value="5">5 Minutos</option>
            </select>
          </div>

          <div class="setup-group">
            <label>🏟️ ESTADIO</label>
            <select id="stadium-type">
              <option value="monumental" selected>Estadio Monumental</option>
              <option value="neon">Arena Industrial (Neon)</option>
            </select>
          </div>

          <div class="team-selection">
            <div class="team-card local">
              <p>LOCAL</p>
              <select id="local-team"></select>
            </div>
            <div class="vs">VS</div>
            <div class="team-card away">
              <p>VISITANTE</p>
              <select id="away-team"></select>
            </div>
          </div>

          <button id="btn-start" class="btn-primary">▶ COMENZAR PARTIDO</button>
        </div>
      </div>

      <!-- HUD -->
      <div id="hud" class="hidden">
        <div class="top-hud">
          <div class="authority-bar glass-inner">
            <span class="label">AUTORIDAD</span>
            <div class="bar"><div id="authority-bar" style="width:70%"></div></div>
          </div>
          <div class="scoreboard glass-inner">
              <div class="team-name" id="local-name">LOC</div>
              <div class="score-display" id="hud-score">0 - 0</div>
              <div class="team-name" id="away-name">VIS</div>
              <div class="match-time" id="hud-time">00:00</div>
          </div>
        </div>

        <div id="crosshair"></div>

        <!-- Decision Modal -->
        <div id="decision-panel" class="glass-module mini hidden">
            <h3>⚖️ DECISIÓN DEL ÁRBITRO</h3>
            <div class="decision-grid">
              <button data-action="play-on" class="btn-action">SIGA</button>
              <button data-action="foul" class="btn-action warning">FALTA</button>
              <button data-action="yellow" class="btn-action yellow">AMARILLA</button>
              <button data-action="red" class="btn-action red">ROJA</button>
            </div>
        </div>

        <!-- Alerts -->
        <div id="goal-alert" class="hidden">
            <h1 class="glow-text">⚽ GOLAZO!</h1>
        </div>

        <!-- Pantalla de Resultado Final -->
        <div id="match-result" class="hidden"></div>
      </div>
    </div>

    <!-- Three.js Canvas -->
    <canvas id="game-canvas"></canvas>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
